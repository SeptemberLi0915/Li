<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D 游戏 - Canvas 版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: #2d3436;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
            flex-direction: column;
        }

        canvas {
            border: 3px solid #636e72;
            background-color: #87ceeb;
            display: block;
        }

        #info {
            color: #ffffff;
            margin-top: 20px;
            font-size: 16px;
            text-align: center;
        }

        .controls {
            color: #dfe6e9;
            margin-top: 15px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <div id="info">
        <div>Score: <span id="score">0</span> | 生命: <span id="health">❤️ 3</span></div>
        <div class="controls">← → 或 A/D 移动 | ↑ 或 W 跳跃 | 碰3次敌人游戏结束</div>
    </div>

    <script>
        // 游戏配置
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // 游戏状态
        const game = {
            score: 0,
            lives: 3,  // 3条生命
            gameOver: false,
            frameCount: 0  // 帧计数，用于计时
        };

        // 玩家对象
        const player = {
            x: 400,
            y: 450,
            width: 40,
            height: 40,
            velocityY: 0,
            velocityX: 0,
            speed: 5,
            jumpPower: 12,
            isJumping: false,
            color: '#ff0000',
            lastHitTime: 0  // 记录最后碰撞时间，避免多次计算
        };

        // 敌人数组
        const enemies = [];
        
        // 初始化敌人
        for (let i = 0; i < 3; i++) {
            enemies.push({
                x: 100 + i * 250,
                y: 200 + i * 50,
                width: 30,
                height: 30,
                velocityX: 2,
                velocityY: 0,
                color: '#00ff00'
            });
        }

        // 键盘输入
        const keys = {};
        
        window.addEventListener('keydown', (e) => {
            keys[e.key.toLowerCase()] = true;
        });

        window.addEventListener('keyup', (e) => {
            keys[e.key.toLowerCase()] = false;
        });

        // 游戏循环
        function gameLoop() {
            // 清空画布
            ctx.fillStyle = '#87ceeb';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 更新玩家
            updatePlayer();
            
            // 更新敌人
            updateEnemies();
            
            // 检测碰撞
            checkCollisions();
            
            // 绘制游戏对象
            drawPlayer();
            drawEnemies();
            drawGround();

            // 每60帧增加1分（模拟存活时间计分）
            game.frameCount++;
            if (game.frameCount % 60 === 0) {
                game.score++;
            }

            // 更新UI
            document.getElementById('score').textContent = game.score;
            document.getElementById('health').textContent = '❤️ ' + game.lives;

            // 检查游戏结束
            if (game.lives <= 0) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 48px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('游戏结束!', canvas.width / 2, canvas.height / 2 - 50);
                ctx.font = '24px Arial';
                ctx.fillText('得分: ' + game.score, canvas.width / 2, canvas.height / 2);
                ctx.fillText('按 R 重新开始', canvas.width / 2, canvas.height / 2 + 50);
                
                if (keys['r']) {
                    resetGame();
                }
                return;
            }

            requestAnimationFrame(gameLoop);
        }

        function updatePlayer() {
            // 水平移动
            if (keys['arrowleft'] || keys['a']) {
                player.velocityX = -player.speed;
            } else if (keys['arrowright'] || keys['d']) {
                player.velocityX = player.speed;
            } else {
                player.velocityX = 0;
            }

            player.x += player.velocityX;

            // 边界检查
            if (player.x < 0) player.x = 0;
            if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;

            // 重力
            player.velocityY += 0.5;
            player.y += player.velocityY;

            // 地面碰撞
            if (player.y + player.height >= 550) {
                player.y = 550 - player.height;
                player.velocityY = 0;
                player.isJumping = false;
            }

            // 跳跃
            if ((keys['arrowup'] || keys['w']) && !player.isJumping) {
                player.velocityY = -player.jumpPower;
                player.isJumping = true;
            }
        }

        function updateEnemies() {
            enemies.forEach(enemy => {
                // 水平移动
                enemy.x += enemy.velocityX;

                // 碰撞墙壁反弹
                if (enemy.x <= 0 || enemy.x + enemy.width >= canvas.width) {
                    enemy.velocityX *= -1;
                }

                // 重力
                enemy.velocityY += 0.5;
                enemy.y += enemy.velocityY;

                // 地面碰撞
                if (enemy.y + enemy.height >= 550) {
                    enemy.y = 550 - enemy.height;
                    enemy.velocityY = 0;
                    
                    // 随机跳跃
                    if (Math.random() < 0.02) {
                        enemy.velocityY = -8;
                    }
                }
            });
        }

        function checkCollisions() {
            enemies.forEach(enemy => {
                if (isColliding(player, enemy)) {
                    // 只有间隔0.5秒以上才能再次受伤
                    const currentTime = Date.now();
                    if (currentTime - player.lastHitTime > 500) {
                        game.lives--;
                        player.lastHitTime = currentTime;
                    }
                }
            });
        }

        function isColliding(rect1, rect2) {
            return rect1.x < rect2.x + rect2.width &&
                   rect1.x + rect1.width > rect2.x &&
                   rect1.y < rect2.y + rect2.height &&
                   rect1.y + rect1.height > rect2.y;
        }

        function drawPlayer() {
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.width, player.height);
            // 添加简单的眼睛
            ctx.fillStyle = '#000000';
            ctx.fillRect(player.x + 8, player.y + 8, 5, 5);
            ctx.fillRect(player.x + 27, player.y + 8, 5, 5);
        }

        function drawEnemies() {
            enemies.forEach(enemy => {
                ctx.fillStyle = enemy.color;
                ctx.fillRect(enemy.x, enemy.y, enemy.width, enemy.height);
                // 添加眼睛
                ctx.fillStyle = '#000000';
                ctx.fillRect(enemy.x + 5, enemy.y + 5, 3, 3);
                ctx.fillRect(enemy.x + 22, enemy.y + 5, 3, 3);
            });
        }

        function drawGround() {
            ctx.fillStyle = '#654321';
            ctx.fillRect(0, 550, canvas.width, 50);
        }

        function resetGame() {
            game.score = 0;
            game.lives = 3;
            game.gameOver = false;
            game.frameCount = 0;
            player.x = 400;
            player.y = 450;
            player.velocityY = 0;
            player.isJumping = false;
            player.lastHitTime = 0;
            enemies.forEach((enemy, i) => {
                enemy.x = 100 + i * 250;
                enemy.y = 200 + i * 50;
                enemy.velocityX = 2;
                enemy.velocityY = 0;
            });
            gameLoop();
        }

        // 启动游戏
        gameLoop();
    </script>
</body>
</html>
